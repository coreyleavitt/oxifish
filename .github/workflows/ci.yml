name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run cargo test
        run: cargo test --locked

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --locked --dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest tests/ --doctest-modules python/oxifish -v --hypothesis-profile=ci

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Clippy
        run: |
          cargo clippy --locked -- \
            -D warnings \
            -A clippy::useless_conversion \
            -A clippy::manual_is_multiple_of \
            -A clippy::manual_repeat_n

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Ruff check
        run: uvx ruff check python/ tests/ scripts/

      - name: Ruff format check
        run: uvx ruff format --check python/ tests/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies and build
        run: uv sync --locked --dev --reinstall-package oxifish

      - name: Toolchain sync checks (version + Python-floor agreement)
        run: uv run pytest tests/test_toolchain_sync.py

      - name: Type check with mypy
        run: uv run mypy python/ tests/ scripts/ --strict

      - name: Check stub against compiled module with stubtest
        run: uv run python -m mypy.stubtest oxifish

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit
